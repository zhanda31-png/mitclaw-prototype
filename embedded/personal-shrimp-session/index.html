<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人虾会话</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="session-page">
      <section class="session-layout">
        <header class="session-page__header">
          <h1>会话</h1>
        </header>

        <section class="session-card session-toolbar-card">
          <div class="session-toolbar-card__top">
            <div class="session-toolbar-card__filters">
              <button class="toolbar-select toolbar-select--wide" type="button">
                <span class="toolbar-select__tag">个人虾</span>
                <span class="toolbar-select__value">Wei He 何伟的虾军</span>
                <span class="toolbar-select__caret">⌄</span>
              </button>

              <label class="toolbar-search">
                <span class="toolbar-search__icon">⌕</span>
                <input type="text" value="搜索会话..." readonly />
              </label>

              <button class="toolbar-select toolbar-select--compact" type="button">
                <span class="toolbar-select__clock">◔</span>
                <span class="toolbar-select__value">最近 24 小时</span>
              </button>

              <button class="toolbar-refresh" type="button" aria-label="刷新">⟳</button>

              <button class="toolbar-select toolbar-select--compact toolbar-select--ghost" type="button">
                <span class="toolbar-select__value">关...</span>
                <span class="toolbar-select__caret">⌄</span>
              </button>
            </div>
          </div>

          <div class="session-toolbar-card__bottom">
            <div class="session-toolbar-card__actions">
              <button class="small-action small-action--primary" type="button">↗ 导出</button>
              <button class="small-action" type="button">⇅ 时间倒序</button>
              <button class="small-action" type="button">💬 进入容器</button>
            </div>

            <div class="session-toolbar-card__meta">共 1 条 · 15:36:31</div>
          </div>
        </section>

        <section class="session-card session-selector-card">
          <div class="session-selector-card__header">
            <div class="session-selector-card__title">
              <span class="session-selector-card__bubble">◔</span>
              <span>会话选择</span>
              <span class="session-selector-card__count">54 个</span>
            </div>
          </div>

          <label class="toolbar-search toolbar-search--full">
            <span class="toolbar-search__icon">⌕</span>
            <input type="text" value="搜索 session ID 或内容..." readonly />
          </label>

          <div class="session-chip-grid">
            <button class="session-chip session-chip--active" type="button">

          <div class="session-chip-grid__ghost-row" aria-hidden="true">
            <span>◔</span>
