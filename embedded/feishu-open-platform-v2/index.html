<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞书开放平台 - 应用管理</title>
    <link rel="stylesheet" href="./styles.css?v=20260512-open-platform-version-open-detail-fix-v3" />
  </head>
  <body>
    <header class="site-header" aria-hidden="true"></header>

    <main class="page">
      <div class="list-view" id="listView">
      <section class="app-tabs-section">
        <div class="app-tabs-toolbar">
          <div class="app-tabs" role="tablist" aria-label="应用类型">
            <button class="app-tab is-active" data-tab="custom" type="button">岗位虾</button>
          </div>

          <div class="toolbar">
            <button class="create-button toolbar-action-button" id="openCreateButton" type="button">
              申请岗位虾
            </button>
          </div>
        </div>

        <section class="pond-status-overview" id="pondStatusOverview" aria-label="岗位虾状态统计"></section>

        <section class="cards-panel" id="customPanel">
          <div class="pond-filter-toolbar" id="pondFilterToolbar"></div>
          <div class="app-list-host" id="appGrid"></div>

          <div class="empty-state is-hidden" id="emptyState">
            <div class="empty-state-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 6h16" />
                <path d="M7 12h10" />
                <path d="M10 18h4" />
              </svg>
            </div>
            <h2>没有找到匹配的应用</h2>
            <p>可以调整关键字，或者直接创建一个新的企业所属岗位虾。</p>
          </div>
        </section>
      </section>
      </div>

      <div class="detail-view is-hidden" id="detailView">
        <section class="detail-topbar">
          <div class="detail-topbar-left">
            <button class="back-home-button" id="backToListButton" type="button" aria-label="返回应用列表">
              <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M10 3.5 4.5 8v8.5h11V8L10 3.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                <path d="M7.5 16.5v-4h5v4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
              </svg>
            </button>
            <div class="detail-app-summary">
              <div class="app-icon" id="detailHeaderIcon" aria-hidden="true"></div>
              <div>
                <div class="detail-app-title-row">
                  <strong id="detailHeaderName">--</strong>
                  <span class="status-pill" id="detailHeaderStatus">开发中</span>
                </div>
                <p id="detailHeaderMeta">正式应用@小米科技</p>
              </div>
            </div>
          </div>
          <div class="publish-toast publish-toast--success" id="detailPublishToast">
            <span class="publish-toast-icon">✓</span>
            <span class="publish-toast-message">当前修改均已成功发版</span>
          </div>
        </section>

        <section class="detail-layout">
          <aside class="detail-sidebar" id="detailSidebar"></aside>
          <section class="detail-main" id="detailMain"></section>
        </section>
      </div>
    </main>

    <div class="modal-layer is-hidden" id="createModalLayer">
      <div class="modal-backdrop" data-close-create="true"></div>
      <section class="modal-card create-modal" role="dialog" aria-modal="true" aria-labelledby="createAppTitle">
        <button class="modal-close" id="closeCreateModalButton" type="button" aria-label="关闭">×</button>
        <div class="create-modal-scroll">
          <div class="create-modal-head">
            <h2 id="createAppTitle">申请岗位虾</h2>
            <ul class="create-notice-list">
              <li>
                该岗位虾仅可在“小米科技”内部使用，岗位虾发布需经过企业管理员审核，请仔细阅读
                <a href="#" class="notice-link">岗位虾审核规则</a>
              </li>
              <li>
                岗位虾禁止接入OpenClaw、OpenCode、Claude等工具...
                <a href="#" class="notice-link">查看全部</a>
              </li>
            </ul>
          </div>

          <form class="create-form feishu-create-form" id="createAppForm">
            <div class="form-stack">
              <label class="feishu-field">
                <span class="field-label">岗位名称<span class="required-mark">*</span></span>
                <span class="field-counter" id="nameCounter">0/32</span>
                <input id="appNameInput" name="name" type="text" maxlength="32" />
              </label>

              <label class="feishu-field">
                <span class="field-label">岗位职责<span class="required-mark">*</span></span>
                <span class="field-counter textarea-counter" id="descriptionCounter">0/120</span>
                <textarea id="appDescriptionInput" name="description" maxlength="120" rows="5"></textarea>
              </label>

              <label class="feishu-field">
                <span class="field-label">所属部门<span class="required-mark">*</span></span>
                <input id="departmentInput" name="department" type="text" maxlength="40" placeholder="请输入所属部门" />
              </label>

              <label class="feishu-field">
                <span class="field-label">核心场景<span class="required-mark">*</span></span>
                <textarea id="coreScenarioInput" name="coreScenario" maxlength="160" rows="3" placeholder="请描述该岗位虾的核心使用场景"></textarea>
              </label>
            </div>

            <p class="form-error is-hidden" id="formError" role="alert"></p>

            <div class="create-footer">
              <button class="secondary-button" id="cancelCreateButton" type="button">取消</button>
              <button class="primary-button" type="submit">创建</button>
            </div>
          </form>
        </div>
      </section>
    </div>

    <div class="modal-layer is-hidden" id="jobEditModalLayer">
      <div class="modal-backdrop" data-close-job-edit="true"></div>
      <section class="modal-card job-edit-modal" role="dialog" aria-modal="true" aria-labelledby="jobEditTitle">
        <form class="job-edit-form" id="jobEditForm">
          <div class="job-edit-head">
            <h2 id="jobEditTitle">请输入岗位职责</h2>
          </div>

          <div class="job-edit-body">
            <textarea id="jobEditTextarea" rows="6"></textarea>
            <p class="form-error is-hidden" id="jobEditError" role="alert"></p>
          </div>

          <div class="job-edit-footer">
            <button class="secondary-button" id="cancelJobEditButton" type="button">取消</button>
            <button class="primary-button" type="submit">确定</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-layer is-hidden" id="collaboratorModalLayer">
      <div class="modal-backdrop" data-close-collaborator="true"></div>
      <section class="modal-card collaborator-modal" role="dialog" aria-modal="true" aria-labelledby="collaboratorTitle">
        <button class="modal-close collaborator-close" id="closeCollaboratorModalButton" type="button" aria-label="关闭">×</button>
        <form class="collaborator-form" id="collaboratorForm">
          <div class="collaborator-head">
            <h2 id="collaboratorTitle">添加协作者</h2>
          </div>

          <div class="collaborator-body">
            <label class="collaborator-field">
              <span class="field-label">人员<span class="required-mark">*</span></span>
              <div class="collaborator-member-input">
                <input
                  id="collaboratorMembersInput"
                  name="members"
                  type="text"
                  placeholder="请输入姓名或邮箱搜索成员，可同时添加多个成员"
                />
                <span class="collaborator-member-caret" aria-hidden="true">⌄</span>
              </div>
            </label>

            <fieldset class="collaborator-role-group">
              <legend class="field-label">角色<span class="required-mark">*</span></legend>
              <label class="collaborator-role-option">
                <input type="radio" name="collaboratorRole" value="汇报人" checked />
                <span>汇报人</span>
              </label>
              <label class="collaborator-role-option">
                <input type="radio" name="collaboratorRole" value="训虾员" />
                <span>训虾员</span>
              </label>
              <label class="collaborator-role-option">
                <input type="radio" name="collaboratorRole" value="限制用户/部门" />
                <span>限制用户/部门</span>
              </label>
            </fieldset>

            <div class="collaborator-permission-card">
              <h3 id="collaboratorPermissionTitle">汇报人权限</h3>
              <div class="collaborator-permission-list" id="collaboratorPermissionList"></div>
            </div>

            <p class="form-error is-hidden" id="collaboratorError" role="alert"></p>
          </div>

          <div class="create-footer collaborator-footer">
            <button class="secondary-button" id="cancelCollaboratorButton" type="button">取消</button>
            <button class="primary-button" type="submit">确定</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-layer is-hidden" id="spaceManageModalLayer">
      <div class="modal-backdrop" data-close-space-manage="true"></div>
      <section class="modal-card manage-modal space-manage-modal" role="dialog" aria-modal="true" aria-labelledby="spaceManageTitle">
        <button class="modal-close" id="closeSpaceManageModalButton" type="button" aria-label="关闭">×</button>
        <form class="space-manage-form" id="spaceManageForm">
          <div class="manage-header space-manage-header">
            <div>
              <h2 id="spaceManageTitle">空间管理</h2>
              <p>
                查看 <span id="spaceManageTitleName">当前岗位虾</span>
                的专属空间、模型与运行镜像。
              </p>
            </div>
          </div>

          <div class="space-manage-body">
            <div class="space-manage-grid">
              <label class="feishu-field">
                <span class="field-label">空间名称</span>
                <input id="spaceManageNameInput" name="spaceName" type="text" maxlength="40" readonly />
              </label>

              <label class="feishu-field">
                <span class="field-label">容器规格</span>
                <input id="spaceManageSpecInput" name="containerSpec" type="text" readonly />
              </label>

              <label class="feishu-field space-manage-field--full">
                <span class="field-label">模型</span>
                <input id="spaceManageModelInput" name="spaceModel" type="text" maxlength="80" readonly />
              </label>

              <label class="feishu-field space-manage-field--full">
                <span class="field-label">镜像</span>
                <input id="spaceManageImageInput" name="spaceImage" type="text" maxlength="160" readonly />
              </label>

              <label class="feishu-field">
                <span class="field-label">更新日期</span>
                <input id="spaceManageOwnerInput" name="spaceUpdatedAt" type="text" readonly />
              </label>

              <label class="feishu-field">
                <span class="field-label">管理员</span>
                <input id="spaceManageAdminsInput" name="spaceAdmins" type="text" maxlength="80" readonly />
              </label>
            </div>

            <p class="form-error is-hidden" id="spaceManageError" role="alert"></p>
          </div>
        </form>
      </section>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

    <script src="./script.js?v=20260512-open-platform-version-open-detail-fix-v3"></script>
  </body>
</html>
